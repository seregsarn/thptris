lol, tetris

[N]: New Game

[A / Left Arrow]: left
[D / Right Arrow]: right
[Q / Shift+Left Arrow]: Rotate CCW
[E / Shift+Right Arrow]: Rotate CW
[S / Down Arrow]: Drop
[W / Up Arrow]: Sonic Drop
<!-- super secret! press * to show/hide the super-zoomed-in version of the game so you don't have to destroy your eyes playing it. -->
